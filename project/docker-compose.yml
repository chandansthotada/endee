version: '3.9'

services:
  endee:
    image: endee/endee:latest
    container_name: endee_db
    ports:
      - "8080:8080"
    volumes:
      - endee_data:/data

  chatbot:
    build: .
    container_name: chatbot_app
    ports:
      - "8000:8000"
    depends_on:
      - endee
    environment:
      - ENDEE_HOST=endee
      - ENDEE_PORT=8080

volumes:
  endee_data:
